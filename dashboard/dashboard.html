<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | System Analytics</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #05050c; color: #f3f4f6; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10 pb-4 border-b border-white/10">
            <h1 class="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">SYSTEM CONTROL PANEL</h1>
            <a href="../index.html" class="px-4 py-2 border border-white/20 rounded-lg hover:bg-white/5 transition text-sm">Return Home</a>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="glass p-6 rounded-xl">
                <h3 class="text-gray-400 text-sm font-medium uppercase">Total System Analytics</h3>
                <p id="visitorNum" class="text-4xl font-black text-purple-400 mt-2">Online</p>
            </div>
            <div class="glass p-6 rounded-xl">
                <h3 class="text-gray-400 text-sm font-medium uppercase">Secret Transmissions</h3>
                <p id="messageNum" class="text-4xl font-black text-pink-500 mt-2">0</p>
            </div>
        </div>

        <!-- Messages Section -->
        <div class="glass p-6 rounded-xl">
            <h2 class="text-xl font-bold mb-4 text-white">Incoming Anonymous Messages</h2>
            <div id="msgInbox" class="space-y-4">
                <p class="text-gray-500 text-sm italic">Connecting to secure terminal...</p>
            </div>
        </div>
    </div>

    <!-- Firebase Old SDKs (for easy configuration) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <!-- মূল ফোল্ডারের ফায়ারবেস কনফিগ লিংক -->
    <script src="../firebase.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (window.db) {
                // রিয়েল-টাইম সিক্রেট মেসেজ রিড করার লজিক
                window.db.collection("messages").orderBy("timestamp", "desc").onSnapshot((snap) => {
                    document.getElementById('messageNum').textContent = snap.size;
                    const inbox = document.getElementById('msgInbox');
                    inbox.innerHTML = '';

                    if (snap.empty) {
                        inbox.innerHTML = '<p class="text-gray-500 text-sm">No transmissions intercepted yet.</p>';
                        return;
                    }

                    snap.forEach((doc) => {
                        const data = doc.data();
                        const card = document.createElement('div');
                        card.className = 'p-4 bg-white/5 border border-white/5 rounded-lg';
                        
                        // টাইমস্ট্যাম্প চেক করা
                        const timeString = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleString() : "Just now";
                        
                        card.innerHTML = `
                            <p class="text-sm text-gray-200">${data.text}</p>
                            <span class="text-[10px] text-gray-500 block mt-2">${timeString}</span>
                        `;
                        inbox.appendChild(card);
                    });
                }, (error) => {
                    console.error("Error fetching messages: ", error);
                });
            } else {
                document.getElementById('msgInbox').innerHTML = '<p class="text-red-400 text-sm">Database link offline. Please configure firebase.js with real API keys.</p>';
            }
        });
    </script>
</body>
</html>
