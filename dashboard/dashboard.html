<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Dashboard | Digital Universe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bg-[#05050c] text-gray-200 min-h-screen">
    <div class="flex min-h-screen flex-col md:flex-row">
        <aside class="w-full md:w-64 glass p-6 flex flex-col gap-2 border-r border-white/5">
            <div class="text-xl font-bold tracking-widest mb-8 bg-gradient-to-r from-purple-400 to-blue-500 bg-clip-text text-transparent">
                DU CONTROL
            </div>
            <a href="dashboard.html" class="bg-white/10 text-white px-4 py-3 rounded-lg font-medium transition">
                Dashboard
            </a>
            <a href="#" class="hover:bg-white/5 px-4 py-3 rounded-lg text-gray-400 hover:text-white transition"> 
                Projects
            </a>
            <a href="ai-chat.html" class="hover:bg-white/5 px-4 py-3 rounded-lg text-gray-400 hover:text-white transition"> 
                AI Chat Hub
            </a>
            <a href="../index.html" class="hover:bg-white/5 px-4 py-3 rounded-lg text-gray-400 hover:text-white mt-auto text-sm border-t border-white/5 pt-4"> 
                Back Home
            </a>
        </aside>

        <main class="flex-1 p-8">
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h2 class="text-2xl font-bold text-white">System Analytics</h2>
                    <p class="text-sm text-gray-400">Real-time cloud core architecture telemetry metrics.</p>
                </div>
                <div class="px-4 py-2 glass rounded-lg text-xs tracking-wider border-emerald-500/30 text-emerald-400 font-semibold bg-emerald-500/5">
                    CORE CONNECTED
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass p-6 rounded-xl">
                    <h3 class="text-xs uppercase font-semibold text-gray-500 tracking-wider">Active Deployments</h3>
                    <div class="text-4xl font-bold mt-2 text-white counter" data-target="14">0</div>
                </div>
                <div class="glass p-6 rounded-xl">
                    <h3 class="text-xs uppercase font-semibold text-gray-500 tracking-wider">AI API Allocations</h3>
                    <div class="text-4xl font-bold mt-2 text-white counter" data-target="480">0</div>
                </div>
                <div class="glass p-6 rounded-xl">
                    <h3 class="text-xs uppercase font-semibold text-gray-500 tracking-wider">Server Connections</h3>
                    <div class="text-4xl font-bold mt-2 text-white counter" data-target="92">0</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // High Performance Incremental Numerical Telemetry Counter
        document.addEventListener("DOMContentLoaded", () => {
            const counters = document.querySelectorAll('.counter');
            counters.forEach(counter => {
                const target = parseInt(counter.getAttribute('data-target'), 10);
                let current = 0;
                const increment = Math.ceil(target / 40);
                
                const animateCounter = () => {
                    if (current < target) {
                        current += increment;
                        if (current > target) current = target;
                        counter.innerText = current;
                        setTimeout(animateCounter, 25);
                    }
                };
                animateCounter();
            });
        });
    </script>
</body>
</html>
