<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumon.Dev | Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: #030611; 
            color: #f3f4f6;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        /* প্রিমিয়াম গ্লাস-মরফিজম ইফেক্ট */
        .glass { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        /* নিয়ন গ্লো ইফেক্ট */
        .neon-glow-purple { box-shadow: 0 0 25px rgba(168, 85, 247, 0.15); }
        .neon-glow-pink { box-shadow: 0 0 25px rgba(236, 72, 153, 0.15); }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen relative overflow-x-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-[400px] h-[400px] bg-purple-600/10 rounded-full blur-[120px] -z-10"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[400px] h-[400px] bg-pink-600/10 rounded-full blur-[120px] -z-10"></div>

    <div class="max-w-5xl mx-auto relative z-10">
        <header class="flex justify-between items-center mb-10 pb-6 border-b border-white/10">
            <div>
                <h1 class="text-2xl md:text-3xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">
                    SUMON.DEV // CONTROL PANEL
                </h1>
                <p class="text-xs text-gray-500 mt-1 uppercase tracking-widest">Secure Terminal Connected</p>
            </div>
            <a href="../index.html" class="flex items-center gap-2 px-4 py-2 border border-white/10 rounded-xl hover:bg-white/5 hover:border-white/30 transition text-sm font-medium">
                <i class="fa-solid fa-arrow-left text-xs"></i> Return Home
            </a>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="glass p-6 rounded-2xl neon-glow-purple transition-all duration-300 hover:border-purple-500/30">
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="text-gray-400 text-xs font-semibold uppercase tracking-wider">Total System Analytics</h3>
                        <p id="visitorNum" class="text-4xl font-black text-purple-400 mt-2 tracking-tight">Online</p>
                    </div>
                    <div class="p-3 bg-purple-500/10 rounded-xl text-purple-400">
                        <i class="fa-solid fa-chart-simple text-xl"></i>
                    </div>
                </div>
            </div>
            
            <div class="glass p-6 rounded-2xl neon-glow-pink transition-all duration-300 hover:border-pink-500/30">
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="text-gray-400 text-xs font-semibold uppercase tracking-wider">Secret Transmissions</h3>
                        <p id="messageNum" class="text-4xl font-black text-pink-500 mt-2 tracking-tight">0</p>
                    </div>
                    <div class="p-3 bg-pink-500/10 rounded-xl text-pink-500">
                        <i class="fa-solid fa-user-secret text-xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass p-6 rounded-2xl transition-all duration-300 hover:border-white/10">
            <div class="flex items-center gap-3 mb-6 border-b border-white/5 pb-4">
                <i class="fa-solid fa-inbox text-pink-400 text-lg"></i>
                <h2 class="text-lg font-bold text-white tracking-wide">Incoming Anonymous Messages</h2>
            </div>
            <div id="msgInbox" class="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                <p class="text-gray-500 text-sm italic flex items-center gap-2">
                    <i class="fa-solid fa-circle-notch animate-spin text-purple-400"></i> Connecting to secure terminal...
                </p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="../firebase.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (window.db) {
                // রিয়েল-টাইম মেসেজ রিড করার ফায়ারবেস লজিক
                window.db.collection("messages").orderBy("timestamp", "desc").onSnapshot((snap) => {
                    document.getElementById('messageNum').textContent = snap.size;
                    const inbox = document.getElementById('msgInbox');
                    inbox.innerHTML = '';

                    if (snap.empty) {
                        inbox.innerHTML = `
                            <div class="text-center py-8 border border-dashed border-white/5 rounded-xl">
                                <i class="fa-solid fa-ghost text-gray-600 text-3xl mb-2"></i>
                                <p class="text-gray-500 text-sm">No transmissions intercepted yet.</p>
                            </div>`;
                        return;
                    }

                    snap.forEach((doc) => {
                        const data = doc.data();
                        const card = document.createElement('div');
                        card.className = 'p-4 bg-white/[0.02] border border-white/5 rounded-xl hover:bg-white/[0.04] transition duration-200';
                        
                        const timeString = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleString() : "Just now";
                        
                        card.innerHTML = `
                            <div class="flex justify-between items-start gap-4">
                                <p class="text-sm text-gray-200 leading-relaxed">${data.text}</p>
                                <span class="text-[10px] text-gray-500 whitespace-nowrap bg-white/5 px-2 py-1 rounded-md"><i class="fa-regular fa-clock mr-1"></i>${timeString}</span>
                            </div>
                        `;
                        inbox.appendChild(card);
                    });
                }, (error) => {
                    console.error("Error fetching messages: ", error);
                });
            } else {
                document.getElementById('msgInbox').innerHTML = `
                    <div class="p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-sm flex items-center gap-2">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        Database link offline. Please configure firebase.js with real API keys.
                    </div>`;
            }
        });
    </script>
</body>
</html>
