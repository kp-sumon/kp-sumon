<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kp Sumon | Explore the Future</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="ultra.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        .theme-night { background: radial-gradient(circle at top right, #1a0b36, #05050c); color: #f3f4f6; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-premium { background: linear-gradient(45deg, #a855f7, #ec4899); color: white; padding: 0.75rem 1.5rem; border-radius: 0.75rem; font-weight: 600; transition: all 0.3s; }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(236, 72, 153, 0.3); }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    </style>
</head>
<body id="mainBody" class="theme-night min-h-screen font-sans transition-colors duration-1000 relative overflow-x-hidden">

    <div id="canvas-container"></div>

    <header class="glass fixed top-0 left-0 w-full z-50 px-6 py-4">
        <nav class="max-w-7xl mx-auto flex justify-between items-center">
            <h2 class="text-2xl font-bold tracking-wider bg-gradient-to-r from-pink-500 to-violet-600 bg-clip-text text-transparent">DIGITAL UNIVERSE</h2>
            <ul id="menu" class="flex gap-8 font-medium text-white">
                <li><a href="index.html">Home</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
            </ul>
        </nav>
    </header>

    <section class="min-h-screen flex flex-col justify-center items-center text-center px-4 pt-20 relative z-10">
        <h1 class="text-5xl md:text-6xl font-extrabold text-white">Kp Súmöñ</h1>
        <p class="text-lg text-gray-300 mt-4">FULL STACK DEVELOPER | AI SPECIALIST | FUTURE INNOVATOR</p>
    </section>

    <section class="max-w-3xl mx-auto px-6 py-16 relative z-10">
        <div class="glass p-8 rounded-2xl text-center">
            <h3 class="text-2xl font-bold text-white mb-4">🤫 আমাকে একটি সিক্রেট মেসেজ পাঠাও!</h3>
            <textarea id="secretMessage" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-white focus:outline-none focus:border-purple-500 h-28 mb-4" placeholder="আপনার গোপন বার্তাটি এখানে লিখুন..."></textarea>
            <button id="sendMsgBtn" class="btn-premium">বার্তা পাঠান</button>
            <p id="successAlert" class="text-emerald-400 mt-3 hidden">🎉 বার্তাটি সফলভাবে পৌঁছে গেছে!</p>
        </div>
    </section>

    <!-- স্ক্রিপ্টস -->
    <script type="module" src="firebase.js"></script>
    <script type="module" src="script.js"></script>
    <script src="three-bg.js"></script>
</body>
</html>
